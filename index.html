<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ใส่รหัสให้ถูกนะ</title>
  <!-- <link href="style.css" rel="stylesheet"> -->

  <style>
    /* Google Font Import */
@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Prompt', sans-serif;
}

body {
  background: linear-gradient(135deg, #ffccd5, #ffafcc, #bde0fe);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-size: 300% 300%;
  animation: gradient 15s ease infinite;
}

@keyframes gradient {
  0% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
  100% {
    background-position: 0% 50%;
  }
}

.login-container {
  background-color: rgba(255, 255, 255, 0.9);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
  width: 350px;
  text-align: center;
  transform: translateY(0);
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0% {
    transform: translateY(0px);
  }
  50% {
    transform: translateY(-15px);
  }
  100% {
    transform: translateY(0px);
  }
}

h2 {
  color: #ff6b94;
  margin-bottom: 30px;
  font-size: 28px;
  text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
}

.password-form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input {
  padding: 15px;
  border: 2px solid #ffafcc;
  border-radius: 50px;
  outline: none;
  font-size: 16px;
  transition: all 0.3s ease;
  text-align: center;
}

input:focus {
  border-color: #ff6b94;
  box-shadow: 0 0 10px rgba(255, 107, 148, 0.5);
}

input::placeholder {
  color: #aaa;
}

button {
  background-color: #ff6b94;
  color: white;
  border: none;
  padding: 15px 20px;
  border-radius: 50px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 500;
  transition: all 0.3s ease;
  margin-top: 10px;
}

button:hover {
  background-color: #ff4b7a;
  transform: translateY(-3px);
  box-shadow: 0 5px 15px rgba(255, 107, 148, 0.4);
}

button:active {
  transform: translateY(0);
}

#login-error {
  color: #ff4b7a;
  font-size: 14px;
  min-height: 20px;
}

/* Adding some cute decoration */
.login-container::before {
  content: "❤️";
  position: absolute;
  font-size: 24px;
  top: -15px;
  left: 20px;
  animation: bounce 2s infinite;
}

.login-container::after {
  content: "❣️";
  position: absolute;
  font-size: 24px;
  bottom: -15px;
  right: 20px;
  animation: bounce 2s infinite 0.5s;
}

@keyframes bounce {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-10px);
  }
}
  </style>
</head>
<body>
  <div class="login-container">
    <h2>💖 ใส่รหัสให้ถูกนะ 💖</h2>
    <div class="password-form">
      <input id="password-input" type="password" placeholder="รหัสคืออะไรน้า">
      <p id="login-error"></p>
      <button onclick="checkPassword()">ถ้ามั่นใจแล้วกดเลย</button>
    </div>
  </div>

  <script>
    function checkPassword() {
      const password = document.getElementById("password-input").value.trim();
      const errorText = document.getElementById("login-error");
      if (password === "25122565") {
        sessionStorage.setItem("loggedIn", "true");
        window.location.href = "page1.html";
      } else {
        errorText.innerText = "รหัสไม่ถูกต้อง ลองใหม่สิ 💔";
      }
    }
  </script>
</body>
</html>
