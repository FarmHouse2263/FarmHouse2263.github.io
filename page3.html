<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>หน้า 3</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Prompt', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ffccd5, #ffafcc, #bde0fe, #a2d2ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      position: relative;
      padding: 20px;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: rgba(255, 255, 255, 0.8);
      transform: rotate(45deg);
      animation: fall linear forwards;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: inherit;
      border-radius: 50%;
    }

    .heart::before {
      top: -10px;
      left: 0;
    }

    .heart::after {
      top: 0;
      left: -10px;
    }

    @keyframes fall {
      to {
        transform: rotate(45deg) translateY(100vh);
        opacity: 0;
      }
    }

    .flower {
      position: absolute;
      font-size: 20px;
      animation: float linear forwards;
      opacity: 0.8;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }

    .page {
      background-color: rgba(255, 255, 255, 0.92);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.18);
      width: 450px;
      text-align: center;
      position: relative;
      z-index: 10;
      transform: scale(0.9);
      opacity: 0;
      animation: appear 1s forwards 0.5s;
    }

    @keyframes appear {
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateY(-20px) scale(0.9);
      }
    }

    h1 {
      color: #ff6b94;
      margin-bottom: 25px;
      font-size: 28px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      position: relative;
      display: inline-block;
    }

    h1::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #ff6b94, transparent);
    }

    p {
      color: #555;
      font-size: 18px;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .heart-container {
      display: flex;
      justify-content: center;
      margin: 20px 0 30px;
    }

    .heart-svg {
      width: 150px;
      height: 150px;
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .message {
      background-color: rgba(255, 175, 204, 0.2);
      border: 2px solid rgba(255, 175, 204, 0.5);
      border-radius: 15px;
      padding: 20px;
      margin: 25px 0;
      color: #555;
      font-size: 16px;
      position: relative;
      line-height: 1.6;
    }

    .message::before {
      content: "💌";
      position: absolute;
      top: -12px;
      left: 20px;
      background-color: white;
      padding: 0 10px;
      font-size: 20px;
    }

    .button {
      background-color: #ff6b94;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 500;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }

    .button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: all 0.6s ease;
      z-index: -1;
    }

    .button:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(255, 107, 148, 0.4);
    }

    .button:hover::before {
      left: 100%;
    }

    .button:active {
      transform: translateY(-2px);
    }

    .image-gallery {
      display: flex;
      justify-content: center;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .polaroid {
      background: white;
      padding: 10px;
      width: 110px;
      height: 130px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
      margin: 0 10px 20px;
      position: relative;
    }

    .polaroid:nth-child(odd) {
      transform: rotate(-5deg);
    }

    .polaroid:nth-child(even) {
      transform: rotate(5deg);
    }

    .polaroid:hover {
      transform: scale(1.1) rotate(0deg);
      z-index: 5;
    }

    .polaroid img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      margin-bottom: 10px;
    }

    .polaroid p {
      font-size: 12px;
      margin: 0;
      text-align: center;
      font-weight: 500;
      color: #555;
    }

    .emoji {
      position: absolute;
      font-size: 24px;
      animation: emojiRain 4s linear forwards;
    }

    @keyframes emojiRain {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .floating-hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 100;
    }

    .floating-heart {
      position: absolute;
      color: #ff6b94;
      font-size: 24px;
      opacity: 0;
      animation: floatUp 4s ease-in-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(20px); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-100px); }
    }
  </style>
</head>
<body>
  <div class="floating-hearts" id="floating-hearts"></div>
  <div class="page" id="page">
    <h1>ความน่ารักของแฟน 💘</h1>
    
    <div class="heart-container">
      <svg class="heart-svg" viewBox="0 0 100 100">
        <path fill="#ff6b94" d="M92.71,7.27c-9.71-9.69-25.46-9.69-35.18,0L50,14.79l-7.54-7.52C32.75-2.42,17-2.42,7.29,7.27c-9.71,9.69-9.71,25.41,0,35.1L50,85l42.71-42.63C102.43,32.68,102.43,16.96,92.71,7.27z"></path>
      </svg>
    </div>
    
    <p>มีความสุขทุกครั้งที่ได้อยู่กับเธอ</p>
    
    <div class="message">
      ขอบคุณที่เข้ามาเป็นส่วนหนึ่งในชีวิตของเค้านะ เค้ารักเธอมากๆเลย รักที่สุดเลย 💕
    </div>
    
    <div class="image-gallery">
      <div class="polaroid">
        <img src="23076.jpg" alt="ความทรงจำ 1">
        <p>จปน้อย</p>
      </div>
      <div class="polaroid">
        <img src="2.jpg" alt="ความทรงจำ 2">
        <p>น่ารักมาก</p>
      </div>
      <div class="polaroid">
        <img src="3.jpg" alt="ความทรงจำ 3">
        <p>ขยันสุดๆ รีดผ้า</p>
      </div>
      <div class="polaroid">
        <img src="4.jpg" alt="ความทรงจำ 4">
        <p>ขี้อ้อนสุดๆ</p>
      </div>
    </div>
    
    <a href="page4.html" class="button" onclick="nextPage(event)">ไปหน้าถัดไป ❤️</a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      for (let i = 0; i < 15; i++) createHeart();
      const flowers = ['🌸', '🌼', '🌺', '💮', '🏵️'];
      for (let i = 0; i < 10; i++) createFlower(flowers[Math.floor(Math.random() * flowers.length)]);
      setInterval(createFloatingHeart, 1000);
      startEmojiRain();
    });

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      const size = Math.random() * 15 + 10;
      heart.style.width = `${size}px`;
      heart.style.height = `${size}px`;
      heart.style.left = `${Math.random() * 100}%`;
      heart.style.top = '-50px';
      heart.style.backgroundColor = ['#ff6b94', '#ffafcc', '#ff8fab', '#ffc2d1'][Math.floor(Math.random() * 4)];
      heart.style.animationDuration = `${Math.random() * 10 + 5}s`;
      heart.style.animationDelay = `${Math.random() * 5}s`;
      document.body.appendChild(heart);
      setTimeout(() => { heart.remove(); createHeart(); }, 15000);
    }

    function createFlower(emoji) {
      const flower = document.createElement('div');
      flower.className = 'flower';
      flower.textContent = emoji;
      flower.style.left = `${Math.random() * 100}%`;
      flower.style.bottom = '-20px';
      flower.style.animationDuration = `${Math.random() * 10 + 5}s`;
      flower.style.fontSize = `${Math.random() * 10 + 15}px`;
      document.body.appendChild(flower);
      setTimeout(() => flower.remove(), 15000);
    }

    function createFloatingHeart() {
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.textContent = '💖';
      heart.style.left = `${Math.random() * 100}%`;
      heart.style.bottom = '0';
      document.getElementById('floating-hearts').appendChild(heart);
      setTimeout(() => heart.remove(), 4000);
    }

    function startEmojiRain() {
      setInterval(() => {
        const emoji = document.createElement('div');
        emoji.className = 'emoji';
        emoji.textContent = ['💖','💗','💘','💝','💞'][Math.floor(Math.random() * 5)];
        emoji.style.left = `${Math.random() * 100}vw`;
        emoji.style.top = `-30px`;
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), 4000);
      }, 400);
    }

    function nextPage(event) {
      event.preventDefault();
      const page = document.getElementById('page');
      page.style.animation = 'fadeOut 0.7s forwards';
      setTimeout(() => {
        window.location.href = "page4.html";
      }, 700);
    }
  </script>
</body>
</html>
