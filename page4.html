<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>หน้า 4</title>
  <link href="style.css" rel="stylesheet">
  <!-- <script src="script.js" defer></script> -->

  <style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Sarabun', sans-serif;
        background: linear-gradient(to bottom, #ffe6f0, #ffffff);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      
      .page {
        text-align: center;
        background-color: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }
      
      h1 {
        font-size: 2.5em;
        color: #d63384;
      }
      
      p {
        font-size: 1.2em;
        color: #333;
        margin-bottom: 20px;
      }
      
      button {
        padding: 10px 20px;
        background-color: #ff69b4;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1em;
        cursor: pointer;
        transition: background-color 0.3s;
      }
      
      button:hover {
        background-color: #ff1493;
      }
      
      .video-container {
        margin-top: 30px;
        display: flex;
        justify-content: center;
      }
      
      .video-container video {
        width: 80%;
        max-width: 600px;
        border-radius: 15px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      }
      
  </style>
</head>
<body>
  <div class="page">
    <h1>สุดท้ายนี้...</h1>
    <p>ขอบคุณที่อยู่ข้างๆเค้าน้าา ขอบคุณที่เป็นแฟนที่ดีที่สุดในโลก 💖</p>

    <div class="video-container">
      <video controls>
        <source src="f85f985b-f022-43cf-a0dd-5b3a9e4d1204.mp4" type="video/mp4">
        วิดีโอนี้ไม่สามารถเล่นได้ในเบราว์เซอร์ของคุณ
      </video>
    </div>
  </div>
</body>
</html>
